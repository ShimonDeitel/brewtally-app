name: Brewtally
options:
  bundleIdPrefix: com.shimondeitel.coffeelog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Brewtally:
    type: application
    platform: iOS
    sources:
      - path: Brewtally
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coffeelog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Brewtally/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BrewtallyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BrewtallyTests
    dependencies:
      - target: Brewtally
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coffeelog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BrewtallyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BrewtallyUITests
    dependencies:
      - target: Brewtally
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coffeelog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Brewtally:
    build:
      targets:
        Brewtally: all
        BrewtallyTests: [test]
        BrewtallyUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Brewtally.storekit
    test:
      config: Debug
      storeKitConfiguration: Brewtally.storekit
      targets:
        - BrewtallyTests
        - BrewtallyUITests
    archive:
      config: Release
